appId: com.frozenink.desktop
productName: Frozen Ink
copyright: Copyright © 2026

# Tells electron-builder where to emit `latest-*.yml` update manifests during
# dist:* runs, and where electron-updater should look at runtime. Uploading
# the installers themselves to the release is handled by our GH workflow.
publish:
  provider: github
  owner: vboctor
  repo: frozen-ink

directories:
  output: release
  buildResources: build

files:
  - "dist/**/*"
  - "node_modules/**/*"
  - "package.json"

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: build/icon.png
  category: Development
  maintainer: Victor Boctor <vboctor@gmail.com>
  synopsis: Frozen Ink desktop app
  description: A local-first reader for Frozen Ink collections.
  # Default artifactName embeds the scoped npm package name ("@frozenink/desktop"),
  # and fpm interprets the "/" as a directory — which makes the .deb build fail
  # with "Parent directory does not exist". Use a plain slug instead.
  artifactName: "frozenink-desktop-${version}-${arch}.${ext}"
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

npmRebuild: true
nodeGypRebuild: false

extraResources:
  - from: "../ui/dist"
    to: "ui-dist"
    filter:
      - "**/*"
  - from: "../worker/dist"
    to: "worker-dist"
    filter:
      - "worker.js"
